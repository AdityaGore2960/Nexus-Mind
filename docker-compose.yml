version: "3.9"

services:
  # ── PostGIS Database ───────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexusmind
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexusmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nexus-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # ── AI Backend ────────────────────────────────────────────────────────────
  ai:
    build:
      context: .
      dockerfile: ai/Dockerfile
      target: production
    container_name: nexus-ai
    restart: unless-stopped
    env_file:
      - ./ai/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://nexus:nexus@postgres:5432/nexusmind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: ai/Dockerfile
      target: production
    container_name: nexus-celery
    restart: unless-stopped
    command: ["celery", "-A", "nexus_ai.tasks.celery_app", "worker", "--loglevel=info", "-Q", "ml,default"]
    env_file:
      - ./ai/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://nexus:nexus@postgres:5432/nexusmind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - ai

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - ai

volumes:
  postgres_data:
  minio_data:
